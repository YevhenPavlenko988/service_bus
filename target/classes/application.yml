spring:
  application:
    name: service-bus
  config:
    import: classpath:routes.yml
  servlet:
    multipart:
      enabled: false

server:
  port: 8081
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-32ch}
