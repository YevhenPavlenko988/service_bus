networks:
  saas_network:
    external: true
    name: saas_network

services:
  service-bus:
    build:
      context: ..
      dockerfile: service_bus/Dockerfile
    container_name: service_bus
    ports:
      - "8081:8081"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8080
      GOOGLE_SERVICE_URL: http://google-service:8082
      JITSI_SERVICE_URL: http://jitsi-meet:8083
      PUSH_SERVICE_URL: http://push-notification:8085
      LESSONS_SERVICE_URL: http://lessons-service:8086
      S3_DO_SERVICE_URL: http://s3-do-service:8089
      JWT_SECRET: local-dev-secret-key-change-in-production-32ch
    networks:
      - saas_network
